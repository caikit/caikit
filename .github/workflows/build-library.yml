name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        test-type: ["full"]
        include:
          - python-version: "3.9"
            test-type: "core"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Run unit tests (full)
        if: matrix.test-type == 'full'
        run: uv run --python ${{ matrix.python-version }} --extra all --extra dev-test pytest --cov=caikit --cov-report=html:coverage-${{ matrix.python-version }} tests -m "not (examples or slow)" -W error::UserWarning
        env:
          DFTYPE: pandas_all
      - name: Run unit tests (core)
        if: matrix.test-type == 'core'
        run: uv run --python ${{ matrix.python-version }} --extra dev-test pytest --cov=caikit --cov-report=html:coverage-core tests/core -W error::UserWarning
