name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          # Special matrix entry to ensure core tests pass without optional deps
          - python-version: "3.9"
            core-only: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Run unit tests
        if: ${{ !matrix.core-only }}
        run: uv run --no-editable --python ${{ matrix.python-version }} --extra all --extra dev-test pytest --cov=caikit --cov-report=html:coverage --cov-report=xml:coverage.xml tests -m "not (examples or slow)" -W error::UserWarning
      - name: Run core-only unit tests
        if: ${{ matrix.core-only }}
        run: uv run --no-editable --python ${{ matrix.python-version }} --extra dev-test pytest tests/core
