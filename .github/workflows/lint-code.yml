name: Lint and Format

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Check Formatting
        run: uv run --extra dev-fmt ./scripts/fmt.sh
      - name: Linting
        run: uv run --extra all --extra dev-fmt --extra dev-test ruff check caikit examples
      - name: Setup Graphviz # `graphviz/dot` is required for the import checker
        uses: ts-graphviz/setup-graphviz@v1
      - name: Enforce import rules
        run: uv run --extra dev-fmt ./scripts/check_deps.sh
